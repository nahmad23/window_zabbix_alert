# Windows servers where the Zabbix agent Hostname must be updated.
#
# The inventory hostname (first column) is EXACTLY the value that will be
# written as "Hostname=" in zabbix_agentd.conf on that server.
#
# If a server must be reached on a different IP/FQDN than its inventory
# name, set ansible_host for it (see ggnsitutl06v example below).

[zabbix_windows]
UXUS1SIT1UTL019
UXUS1SIT1UTL018
ggnsitutl06v.unitedlex.global

# Example override if DNS does not resolve the short names:
# UXUS1SIT1UTL019 ansible_host=10.x.x.x
# UXUS1SIT1UTL018 ansible_host=10.x.x.x
